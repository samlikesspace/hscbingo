<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            background-color: #000;
        }

        #welcome {
            width: 50vw;
            height: 100vh;
            position: fixed;
            left: 0;
        }

        main {
            position: fixed;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 50vw;
            height: 100vh;
            background-color: #000000;
        }
        
        #disclaimer {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: grey;
            cursor: pointer;
            z-index: 10;
            background: transparent;
            border: none;
        }

        @media (max-width: 600px) {
            #welcome { display: none; }
            main { width: 100vw; }
        }

        #notification {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #000000;
            border: 2px solid #fff;
            color: #fff;
            z-index: 1000;
            max-width: 400px;
            width: 80%;
        }

        #notification h1 { padding: 0px 20px 10px 20px; border-bottom: 2px solid #fff; }
        #notification p { padding: 5px 20px; }
        #notification.active { display: block; }
        #notification-bottom { padding: 10px 20px; border-top: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        #notification-bottom a { color: yellow; }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="page-content">
        <img src="https://www.w3schools.com/w3images/fjords.jpg" id="welcome">
        <main>
            <!-- Already signed in -->
            <h1>Welcome back!</h1>
            <button id="sign-out">Resume Game</button>
            <details><summary>Available Teachers</summary><div id="game-history"></div></details>

            <!-- Not signed in -->
            <h1>Welcome!</h1>
            <p>This website allows you to play bingo, but with a twist...<br>You play bingo about <strong>HSC Teachers!</strong></p>
            <form>
                <label for="name">Enter your name to start playing:</label><br>
                <input type="text" id="name" name="name"><br>
            </form>
            <button id="sign-in">Start Game</button>
        </main>

        <button id="disclaimer" onclick="showNotification('DISCLAIMER', 'This website was made by a HSC Student. The purpose was to make lessons funner & not to throw shade on any teacher! Keep this is mind while exploring, thanks.', 'Learn more', 'https://example.com')">Disclaimer</button>
    </div>


    <div id="notification"></div>

    <script>
        function showNotification(title, text, link, url) {
          const notification = document.getElementById('notification');
          const pageContent = document.getElementById('page-content');

          notification.innerHTML = `
            <h1> ${title}</h1>
            <p>${text}</p> 
            <div id="notification-bottom">
                <a href="${url}" target="_blank">${link}</a>
                <button class="close-btn" onclick="document.getElementById('notification').classList.remove('active'); document.getElementById('page-content').style.filter = 'none';">x</button>
            </div>`;
          
          notification.classList.add('active');
          pageContent.style.filter = 'blur(5px)';
        }
    </script>
</body>
</html>
