<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            background-color: #000;
        }

        #backdrop {
            width: 100%;
            height: 100%;
            position: fixed;
            left: 0;
            z-index: -1;
        }

        main {
            position: fixed;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            width: 50vw;
            height: 100vh;
            background-color: #000000;
            text-align: center;
        }

        .table {

        }
        
        #disclaimer {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: grey;
            cursor: pointer;
            z-index: 10;
            background: transparent;
            border: none;
        }

        @media (max-width: 600px) {
            #welcome { display: none; }
            main { width: 100vw; }
        }

        #notification {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #000000;
            border: 2px solid #fff;
            color: #fff;
            z-index: 1000;
            max-width: 400px;
            width: 80%;
        }

        #notification h1 { padding: 0px 20px 10px 20px; border-bottom: 2px solid #fff; }
        #notification p { padding: 5px 20px; }
        #notification.active { display: block; }
        #notification-bottom { padding: 10px 20px; border-top: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        #notification-bottom a { color: yellow; }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="page-content">
         <img src="backdrop.svg" id="backdrop">
        <main>
            <h1 id="welcome">WELCOME!</h1>
            <p id="intro"><strong>Welcome to HSC Bingo!</strong> Play bingo in class using custom boards built for your teachers. Select a teacher from the list below to get started. Want to help expand the game? Visit our <a style="color: #ffffff;" href="contributors">Contributors Page</a> to submit ideas and help us build a unique board for every teacher!</p>
                <hr>
            <button id="resume">Resume Game</button>

             <div id="avalible-game"></div>

        </main>

    
        <button id="disclaimer" onclick="showNotification('DISCLAIMER', 'This website was made by a HSC Student. The purpose was to make lessons funner & not to throw shade on any teacher! Keep this is mind while exploring, thanks.', 'Learn more', 'https://example.com')">Disclaimer</button>
    </div>


    <div id="notification"></div>

    <script>
        checkActivity()

        function showNotification(title, text, link, url) {
          const notification = document.getElementById('notification');
          const pageContent = document.getElementById('page-content');

          notification.innerHTML = `
            <h1> ${title}</h1>
            <p>${text}</p> 
            <div id="notification-bottom">
                <a href="${url}" target="_blank">${link}</a>
                <button class="close-btn" onclick="document.getElementById('notification').classList.remove('active'); document.getElementById('page-content').style.filter = 'none';">x</button>
            </div>`;
          
          notification.classList.add('active');
          pageContent.style.filter = 'blur(5px)';
        }

        function checkActivity() {
            if (localStorage.length === 0) { 
                document.getElementById('resume').style.display = 'none'
            } else {
                 document.getElementById('welcome').textContent = 'WELCOME BACK!'
             }  
             
             fetch(localStorage)
        }

        function startGame(teacher) {
            window.open('bingo?game=teacher')
        }

    </script>
</body>
</html>
